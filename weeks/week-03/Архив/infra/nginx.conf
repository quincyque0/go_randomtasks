events {
    worker_connections 1024;
}

http {
    upstream shipments_service {
        server host.docker.internal:8270;
    }

    upstream other_service {
        server host.docker.internal:8002;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/shipments/ {
            proxy_pass http://shipments_service/api/shipments/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/other/ {
            proxy_pass http://other_service/api/other/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            return 200 "healthy\n";
        }
    }
}